<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#c89540"/>
      <stop offset="100%" stop-color="#e8c44a"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a9e7e"/>
      <stop offset="50%" stop-color="#c89540"/>
      <stop offset="100%" stop-color="#e8c44a"/>
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4a7ccc"/>
      <stop offset="100%" stop-color="#2a5090"/>
    </linearGradient>
    <linearGradient id="kpiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a9e7e"/>
      <stop offset="100%" stop-color="#4a7ccc"/>
    </linearGradient>
  </defs>

  <!-- Bar chart -->
  <rect x="18" y="52" width="8" height="20" rx="2" fill="url(#barGrad)" opacity="0.7"/>
  <rect x="30" y="42" width="8" height="30" rx="2" fill="url(#barGrad)" opacity="0.85"/>
  <rect x="42" y="32" width="8" height="40" rx="2" fill="url(#barGrad)"/>

  <!-- Circular swoosh -->
  <path d="M 50 80 A 35 35 0 1 1 78 28" stroke="url(#circleGrad)" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Arrow pointing up-right -->
  <line x1="48" y1="60" x2="72" y2="24" stroke="url(#arrowGrad)" stroke-width="4" stroke-linecap="round"/>
  <polygon points="72,18 80,28 68,28" fill="#e8c44a"/>

  <!-- Text: Trade -->
  <text x="100" y="65" font-family="Inter, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#e8ecf1" letter-spacing="-1">Trade</text>

  <!-- Text: KPI -->
  <text x="250" y="65" font-family="Inter, -apple-system, sans-serif" font-size="38" font-weight="800" fill="url(#kpiGrad)" letter-spacing="-1">KPI</text>
</svg>
